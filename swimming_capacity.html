<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游泳學院排課與產能管理工具</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#ececea;--tx:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;
  --bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);--ibg:#e6f1fb;--itx:#0c447c;
  --r:8px;--rl:12px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2c;--tx:#f0ede8;--tx2:#a0a09a;--tx3:#6e6e68;
  --bd:rgba(255,255,255,.12);--bd2:rgba(255,255,255,.22);--ibg:#0c2d4a;--itx:#85b7eb
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg3);color:var(--tx);min-height:100vh;padding:16px 12px;font-size:14px}
.page{max-width:1200px;margin:0 auto}
h1{font-size:19px;font-weight:500;margin-bottom:3px}
.sub{font-size:12px;color:var(--tx2);margin-bottom:14px}
.tabs{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:7px 16px;border:.5px solid var(--bd2);border-radius:var(--r);background:transparent;color:var(--tx2);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.tab.on{background:var(--ibg);color:var(--itx);border-color:transparent}
.card{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--bd);padding:16px;margin-bottom:12px}
.sec{font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:8px}
.hidden{display:none}
.btn{padding:6px 13px;border:.5px solid var(--bd2);border-radius:var(--r);background:transparent;color:var(--tx);cursor:pointer;font-size:12px;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn.pri{background:var(--ibg);color:var(--itx);border-color:transparent}
.btn.red{color:#E24B4A;border-color:#E24B4A44}
.btn.red:hover{background:#E24B4A11}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
select{padding:5px 8px;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:12px;cursor:pointer}
input[type=text]{padding:6px 10px;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:12px;outline:none}
input[type=text]:focus{border-color:var(--itx)}

/* SCHEDULE */
.sched-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.sched-title{font-size:15px;font-weight:500;margin-bottom:6px}
.week-tabs{display:flex;gap:5px;flex-wrap:wrap}
.wtab{padding:5px 12px;border:.5px solid var(--bd2);border-radius:20px;background:transparent;color:var(--tx2);cursor:pointer;font-size:12px;font-weight:500;transition:all .12s}
.wtab.on{background:var(--ibg);color:var(--itx);border-color:transparent}
.grid-wrap{overflow-x:auto;margin-bottom:10px}
.sched-grid{border-collapse:collapse;font-size:12px;min-width:800px;width:100%}
.sched-grid th{background:var(--bg2);color:var(--tx2);font-weight:500;padding:6px 3px;text-align:center;border:.5px solid var(--bd);white-space:nowrap;font-size:11px}
.sched-grid th.day-hd{font-size:12px;font-weight:500;color:var(--tx);background:var(--bg2)}
.sched-grid td{border:.5px solid var(--bd);padding:2px 3px;vertical-align:top}
.time-cell{font-size:11px;color:var(--tx2);text-align:center;white-space:nowrap;background:var(--bg2);padding:4px 3px;font-weight:500;min-width:44px}
.slot-cell{min-height:28px;padding:2px;min-width:48px}
.slot-add{width:100%;min-height:24px;border:.5px dashed var(--bd2);border-radius:5px;background:transparent;cursor:pointer;font-size:11px;color:var(--tx3);display:flex;align-items:center;justify-content:center}
.slot-add:hover{background:var(--bg2)}
.ctag{display:flex;align-items:center;gap:2px;font-size:10px;padding:2px 4px;border-radius:4px;color:#fff;font-weight:500;margin-bottom:2px;width:100%}
.ct-n{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ct-d{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:11px;line-height:1;padding:0;flex-shrink:0}
.ct-d:hover{color:#fff}
.lg-inp{width:100%;border:none;background:transparent;font-size:10px;color:var(--tx);outline:none;padding:2px;resize:none;min-height:22px}
.lg-inp:focus{background:var(--bg2);border-radius:3px}
.diff-box{padding:10px 12px;background:var(--bg2);border-radius:var(--r);font-size:12px;border-left:3px solid #EF9F27;line-height:1.7}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.mov.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--bd2);padding:18px;width:320px;max-width:94vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:500;margin-bottom:2px}
.mmeta{font-size:11px;color:var(--tx2);margin-bottom:10px}
.clist{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;max-height:220px;overflow-y:auto}
.copt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd);cursor:pointer;font-size:12px;transition:background .1s}
.copt:hover{background:var(--bg2)}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.trlist{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;max-height:120px;overflow-y:auto}
.tropt{padding:5px 11px;border:.5px solid var(--bd2);border-radius:20px;background:transparent;cursor:pointer;font-size:12px;color:var(--tx);transition:all .1s}
.tropt.on{background:var(--ibg);color:var(--itx);border-color:transparent}
.modal-actions{display:flex;gap:6px;margin-top:10px}
.mclose{flex:1;padding:8px;border:.5px solid var(--bd2);border-radius:var(--r);background:transparent;color:var(--tx2);cursor:pointer;font-size:12px}
.mclose:hover{background:var(--bg2)}

/* TEACHERS */
.teacher-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.teacher-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:.5px solid var(--bd2);background:var(--bg2);font-size:12px}
.tc-del{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;line-height:1;padding:0;margin-left:2px}
.tc-del:hover{color:#E24B4A}

/* HISTORY */
.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
.mc{background:var(--bg2);border-radius:var(--r);padding:12px}
.mcl{font-size:11px;color:var(--tx2);margin-bottom:4px}
.mcv{font-size:20px;font-weight:500}
.pb{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:3px;transition:width .25s}
.pbars{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.pb-btn{padding:4px 12px;border:.5px solid var(--bd2);border-radius:20px;background:transparent;color:var(--tx2);cursor:pointer;font-size:12px;font-weight:500}
.pb-btn.on{background:var(--ibg);color:var(--itx);border-color:transparent}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.chd{font-size:10px;color:var(--tx2);text-align:center;padding:3px 0;font-weight:500}
.cday{border-radius:5px;padding:4px 2px;text-align:center;border:.5px solid transparent;min-height:44px}
.cday:hover:not(.cempty){border-color:var(--bd2);cursor:pointer}
.cday.on{border-color:var(--bd2)}
.cday.cempty{cursor:default}
.cdn{font-size:11px;font-weight:500;margin-bottom:1px}
.cdp{font-size:10px;font-weight:500}
.htable{width:100%;border-collapse:collapse;font-size:12px}
.htable th{background:var(--bg2);color:var(--tx2);font-weight:500;padding:7px 10px;text-align:left;border:.5px solid var(--bd)}
.htable td{padding:7px 10px;border:.5px solid var(--bd)}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500}
.tl0{background:#e1f5ee;color:#085041}
.tl1{background:#faeeda;color:#633806}
.tl2{background:#fcebeb;color:#791f1f}
@media(prefers-color-scheme:dark){
  .tl0{background:#04342c;color:#9fe1cb}
  .tl1{background:#412402;color:#fac775}
  .tl2{background:#501313;color:#f7c1c1}
}

/* IMPORT */
.izone{border:1.5px dashed var(--bd2);border-radius:var(--rl);padding:16px;text-align:center;cursor:pointer;background:var(--bg2)}
.izone:hover,.izone.drag{background:var(--bg3);border-color:var(--itx)}
.izone p{font-size:12px;color:var(--tx2);margin-bottom:4px}
.izone input{display:none}
.ilog{margin-top:10px;font-size:12px;color:var(--tx2)}

/* PRINT */
@media print{
  body{background:#fff;padding:0;color:#000}
  .tabs,.sched-header .btn,.week-tabs,.no-print{display:none!important}
  .card{border:none;padding:4px}
  .sched-grid{font-size:10px}
  .slot-add,.ct-d{display:none!important}
  #tab-history,#tab-import,#tab-teachers{display:none!important}
  #tab-schedule{display:block!important}
}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}}
.auth-bar{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:var(--rl);border:.5px solid var(--bd);padding:10px 16px;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.auth-left{display:flex;align-items:center;gap:8px;font-size:13px}
.auth-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.auth-dot{width:8px;height:8px;border-radius:50%;background:var(--tx3);flex-shrink:0}
</style>
</head>
<body>
<div class="page">
<h1>游泳學院排課與產能管理工具</h1>
<p class="sub">西屯館（4教學區）× 北屯館（5教學區）</p>

<!-- AUTH BAR -->
<div class="auth-bar">
  <div class="auth-left">
    <span class="auth-icon">&#9679;</span>
    <span id="auth-status">載入中...</span>
  </div>
  <div class="auth-right">
    <span id="sync-info" class="hidden" style="font-size:11px;color:var(--tx2)">
      <span id="sync-status"></span>
    </span>
    <button id="btn-sync" class="btn hidden" onclick="saveToSharePoint()">&#8593; 同步到 SharePoint</button>
    <button id="btn-signin" class="btn pri" onclick="signIn()">&#128274; 登入公司帳號</button>
    <button id="btn-signout" class="btn hidden" onclick="signOut()">登出</button>
  </div>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('schedule')">排課矩陣</button>
  <button class="tab" onclick="switchTab('history')">歷史分析</button>
  <button class="tab" onclick="switchTab('import')">匯入報表</button>
  <button class="tab" onclick="switchTab('teachers')">教師管理</button>
</div>

<!-- SCHEDULE -->
<div id="tab-schedule">
<div class="card">
  <div class="sched-header">
    <div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
        <span class="sched-title" id="sched-title">排課矩陣</span>
        <select id="sched-venue" onchange="renderSched()">
          <option value="x">西屯館</option>
          <option value="b">北屯館</option>
        </select>
        <select id="sched-year"  onchange="onSchedYearChange()"></select>
        <select id="sched-month" onchange="onSchedMonthChange()"></select>
      </div>
      <div class="week-tabs" id="week-tabs"></div>
    </div>
    <div class="row no-print" style="margin-left:auto;margin-bottom:0">
      <button class="btn" onclick="copyWeekToNext()">複製本週到下週 →</button>
      <button class="btn pri" onclick="window.print()">&#128438; 匯出 PDF</button>
    </div>
  </div>
  <div class="grid-wrap" id="sched-grid-wrap"></div>
  <div id="diff-notes"></div>
</div>
</div>

<!-- HISTORY -->
<div id="tab-history" class="hidden">
<div class="card">
  <div class="sec">歷史產能利用率（Bookfast 報表）</div>
  <div class="pbars">
    <button class="pb-btn on" onclick="setPeriod('month')">月</button>
    <button class="pb-btn" onclick="setPeriod('week')">週</button>
    <button class="pb-btn" onclick="setPeriod('year')">年</button>
    <select id="hv-sel" onchange="renderHistory()">
      <option value="x">西屯館</option>
      <option value="b">北屯館</option>
      <option value="all">兩館合計</option>
    </select>
    <select id="hy-sel" onchange="onHYearChange()"></select>
    <select id="hm-sel" onchange="renderHistory()"></select>
  </div>
  <div id="hist-content"></div>
  <div class="row" style="margin-top:10px">
    <button class="btn" onclick="copyHistReport()" id="hcbtn">複製分析報表</button>
    <button class="btn red" onclick="clearAllHistory()">清除所有歷史</button>
  </div>
</div>
</div>

<!-- IMPORT -->
<div id="tab-import" class="hidden">
<div class="card">
  <div class="sec">匯入 Bookfast 預約報表（xlsx）</div>
  <p style="font-size:12px;color:var(--tx2);margin-bottom:12px">每月18號上傳下個月的報表，系統自動解析並儲存到歷史分析（不影響排課矩陣）。</p>
  <div class="izone" id="izone"
    ondrop="onDrop(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave()"
    onclick="document.getElementById('finput').click()">
    <p>拖曳 xlsx 至此，或點擊選擇檔案</p>
    <p style="font-size:11px;color:var(--tx3)">團體課預約報表_XXXXXX.xlsx</p>
    <input type="file" id="finput" accept=".xlsx" onchange="onFileSelect(event)">
  </div>
  <div class="ilog" id="ilog"></div>
  <div class="sec" style="margin-top:16px">已匯入紀錄</div>
  <div id="imp-hist"></div>
</div>
</div>

<!-- TEACHERS -->
<div id="tab-teachers" class="hidden">
<div class="card">
  <div class="sec">教師名單管理</div>
  <div class="teacher-list" id="teacher-list"></div>
  <div class="row">
    <input type="text" id="new-teacher" placeholder="輸入教師代號（如 LA、TC）" style="width:200px"
      onkeydown="if(event.key==='Enter')addTeacher()">
    <button class="btn pri" onclick="addTeacher()">新增教師</button>
  </div>
  <p style="font-size:12px;color:var(--tx2);margin-top:8px">教師代號會出現在排課矩陣的老師選單中。</p>
</div>
</div>
</div>

<!-- MODAL -->
<div class="mov" id="mov" onclick="closeOv(event)">
<div class="modal">
  <h3 id="mt"></h3>
  <p class="mmeta" id="mm"></p>
  <div class="sec" style="margin-bottom:5px">選擇課程</div>
  <div class="clist" id="cl"></div>
  <div class="sec" style="margin-bottom:5px;margin-top:8px">選擇老師（可不選）</div>
  <div class="trlist" id="trl"></div>
  <div class="modal-actions">
    <button class="mclose" onclick="closeModal()">取消</button>
    <button class="btn pri" onclick="confirmModal()">確認新增</button>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

// ===== UTILS =====
function pad(n) { return n < 10 ? '0' + n : String(n); }
function fmtDate(d) { return d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate()); }
function getDaysInMonth(y, m) {
  var days = [], d = new Date(y, m-1, 1);
  while (d.getMonth() === m-1) { days.push(new Date(d)); d.setDate(d.getDate()+1); }
  return days;
}
function rc(r) { return r >= 0.8 ? '#E24B4A' : r >= 0.5 ? '#EF9F27' : '#1D9E75'; }
function tlabel(r) { return r >= 0.8 ? '飽和' : r >= 0.5 ? '穩定' : '離峰'; }
function tcls(r)   { return r >= 0.8 ? 'tl2'  : r >= 0.5 ? 'tl1'  : 'tl0'; }

function getDateSlots(ds) {
  var d = new Date(ds.replace(/\//g, '-'));
  var wd = d.getDay();
  if (wd === 1) return [];
  if (wd === 0 || wd === 6) return WEEKEND_SLOTS.slice();
  return WEEKDAY_SLOTS.slice();
}
function czForVenue(cid, vk) {
  var z = CZONES[cid];
  return z ? (vk === 'x' ? z.x : z.b) : 0;
}
function dateCap(ds, vk) { return getDateSlots(ds).length * VENUES[vk].zones; }
function dateUsed(ds, vk, ym) {
  var sm = ((HD[ym] || {})[vk] || {})[ds] || {};
  var sls = getDateSlots(ds), t = 0;
  for (var i = 0; i < sls.length; i++) {
    var arr = sm[sls[i]] || [];
    for (var j = 0; j < arr.length; j++) t += czForVenue(arr[j], vk);
  }
  return t;
}
function isoWeek(date) {
  var d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  var y = d.getFullYear(), start = new Date(y, 0, 1);
  var w = Math.ceil(((d - start) / 86400000 + 1) / 7);
  return y + '-W' + (w < 10 ? '0' + w : String(w));
}

// ===== SCHEDULE: WEEK UTILS =====
function getWeeksInMonth(y, m) {
  var days = getDaysInMonth(y, m);
  var weeks = 1;
  for (var i = 7; i < days.length; i++) {
    if (days[i].getDay() === 2) weeks++;
  }
  return Math.max(weeks, 4);
}

// Return the actual Date for week w, daykey dk in month y/m
// Week 1 = the week whose Tuesday falls in this month (or first Tuesday)
function getWeekDate(y, m, w, dk) {
  var dkOff = {tue:0, wed:1, thu:2, fri:3, sat:4, sun:5};
  var off = dkOff[dk];
  if (off === undefined) return null;
  var days = getDaysInMonth(y, m);
  // Find first Tuesday
  var firstTue = -1;
  for (var i = 0; i < days.length; i++) {
    if (days[i].getDay() === 2) { firstTue = i; break; }
  }
  if (firstTue < 0) return null;
  var idx = firstTue + (w - 1) * 7 + off;
  if (idx < 0 || idx >= days.length) return null;
  // Verify correct weekday
  var expected = [2,3,4,5,6,0][off];
  if (days[idx].getDay() !== expected) return null;
  return days[idx];
}

function getSlotsForDk(dk) {
  return (dk === 'sat' || dk === 'sun') ? WEEKEND_SLOTS : WEEKDAY_SLOTS;
}

function schedKey(vk, y, m, w, dk, sl) {
  return vk + '-' + y + '-' + m + '-' + w + '-' + dk + '-' + sl;
}

  var ySel = document.getElementById('sched-year');
  var mSel = document.getElementById('sched-month');
  var yh = '';
  for (var y = 2026; y <= 2028; y++)
    yh += '<option value="' + y + '"' + (y === schedYear ? ' selected' : '') + '>' + y + '年</option>';
  ySel.innerHTML = yh;

  var mh = '';
  for (var mo = 1; mo <= 12; mo++)
    mh += '<option value="' + mo + '"' + (mo === schedMonth ? ' selected' : '') + '>' + mo + '月</option>';
  mSel.innerHTML = mh;

  renderWeekTabs();
}

    h += '<button class="wtab' + (schedWeek === w ? ' on' : '') + '" onclick="switchWeek(' + w + ')">第' + w + '週</button>';

function renderSched() {
  var v  = document.getElementById('sched-venue').value;
  schedVenue = v;
  var y  = schedYear, mo = schedMonth, w = schedWeek;
  document.getElementById('sched-title').textContent =
    y + '年' + mo + '月 第' + w + '週 — ' + VENUES[v].name;

  // All slots union
  var allSlots = ['09:30','10:30','11:30','13:30','14:00','15:00','15:30','16:00','16:30','17:00','17:30','18:30','19:30'];

  var h = '<table class="sched-grid"><thead>';
  // Row 1: day headers
  h += '<tr><th rowspan="2" style="min-width:50px">時段</th>';
  for (var di = 0; di < DAY_KEYS.length; di++) {
    var dk = DAY_KEYS[di];
    var dateObj = getWeekDate(y, mo, w, dk);
    var dateLbl = dateObj ? '<br><span style="font-size:10px;font-weight:400;color:var(--tx2)">' + mo + '/' + dateObj.getDate() + '</span>' : '';
    h += '<th colspan="3" class="day-hd">' + DAY_LABELS[dk] + dateLbl + '</th>';
  }
  h += '</tr>';
  // Row 2: sub-headers
  h += '<tr>';
  for (var di = 0; di < DAY_KEYS.length; di++) {
    h += '<th style="font-size:10px;min-width:55px">班</th><th style="font-size:10px;min-width:36px">老師</th><th style="font-size:10px;min-width:44px">救生</th>';
  }
  h += '</tr></thead><tbody>';

  for (var si = 0; si < allSlots.length; si++) {
    var sl = allSlots[si];
    // Check if any day uses this slot
    var anyDay = false;
    for (var di = 0; di < DAY_KEYS.length; di++) {
      if (getSlotsForDk(DAY_KEYS[di]).indexOf(sl) >= 0) { anyDay = true; break; }
    }
    if (!anyDay) continue;

    var sub = SLOT_SUB[sl] ? '<br><span style="font-size:9px;color:var(--tx3)">' + SLOT_SUB[sl] + '</span>' : '';
    h += '<tr><td class="time-cell">' + sl + sub + '</td>';

    for (var di = 0; di < DAY_KEYS.length; di++) {
      var dk = DAY_KEYS[di];
      var validSl = getSlotsForDk(dk);
      if (validSl.indexOf(sl) < 0) {
        h += '<td colspan="3" style="background:var(--bg3)"></td>';
        continue;
      }
      var key   = schedKey(v, y, mo, w, dk, sl);
      var lgKey = 'lg-' + key;
      var items = schedData[key] || [];
      var lgVal = (schedData[lgKey] || '').replace(/"/g, '&quot;');

      // Class cell
      h += '<td class="slot-cell">';
      for (var ii = 0; ii < items.length; ii++) {
        var it = items[ii];
        h += '<div class="ctag" style="background:' + it.color + '">'
           + '<span class="ct-n">' + it.label + '</span>'
           + '<button class="ct-d" onclick="delItem(\'' + key + '\',' + ii + ',event)">×</button>'
           + '</div>';
      }
      h += '<button class="slot-add" onclick="openModal(\'' + key + '\',\'' + dk + '\',\'' + sl + '\')">+</button>';
      h += '</td>';

      // Teacher cell
      h += '<td class="slot-cell">';
      for (var ii = 0; ii < items.length; ii++) {
        var it = items[ii];
        h += '<div class="ctag" style="background:' + it.color + '">'
           + '<span class="ct-n" style="font-size:10px">' + (it.teacher || '—') + '</span>'
           + '</div>';
      }
      h += '</td>';

      // Lifeguard cell
      h += '<td class="slot-cell">'
         + '<textarea class="lg-inp" rows="1" placeholder="救生" onchange="saveLG(\'' + lgKey + '\',this.value)">'
         + lgVal
         + '</textarea></td>';
    }
    h += '</tr>';
  }
  h += '</tbody></table>';
  document.getElementById('sched-grid-wrap').innerHTML = h;
  renderDiffNotes();
}

function delItem(key, idx, e) {
  e.stopPropagation();
  if (!schedData[key]) return;
  schedData[key].splice(idx, 1);
  svS(); renderSched();
}
function saveLG(key, val) { schedData[key] = val; svS(); }

function renderDiffNotes() {
  var v = schedVenue, y = schedYear, mo = schedMonth;
  var nw = getWeeksInMonth(y, mo);
  if (nw <= 1) { document.getElementById('diff-notes').innerHTML = ''; return; }
  var diffs = [];
  for (var w = 2; w <= nw; w++) {
    var wd = [];
    for (var di = 0; di < DAY_KEYS.length; di++) {
      var dk = DAY_KEYS[di];
      var sls = getSlotsForDk(dk);
      for (var si = 0; si < sls.length; si++) {
        var sl = sls[si];
        var k1 = schedKey(v, y, mo, 1, dk, sl);
        var kw = schedKey(v, y, mo, w, dk, sl);
        if (JSON.stringify(schedData[k1] || []) !== JSON.stringify(schedData[kw] || []))
          wd.push(DAY_LABELS[dk] + ' ' + sl);
      }
    }
    if (wd.length) diffs.push('第' + w + '週與第1週不同：' + wd.join('、'));
  }
  var el = document.getElementById('diff-notes');
  if (!diffs.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="diff-box"><strong>備註（各週差異）</strong><br>' + diffs.join('<br>') + '</div>';
}

function copyWeekToNext() {
  var v = schedVenue, y = schedYear, mo = schedMonth, w = schedWeek;
  var nw = getWeeksInMonth(y, mo);
  if (w >= nw) { alert('已是最後一週'); return; }
  for (var di = 0; di < DAY_KEYS.length; di++) {
    var dk = DAY_KEYS[di];
    var sls = getSlotsForDk(dk);
    for (var si = 0; si < sls.length; si++) {
      var sl = sls[si];
      var k1 = schedKey(v, y, mo, w,   dk, sl);
      var k2 = schedKey(v, y, mo, w+1, dk, sl);
      schedData[k2] = JSON.parse(JSON.stringify(schedData[k1] || []));
      var lg1 = 'lg-' + k1, lg2 = 'lg-' + k2;
      if (schedData[lg1]) schedData[lg2] = schedData[lg1];
    }
  }
  svS(); schedWeek = w + 1; renderWeekTabs(); renderSched();
}

function loadPrevMonth() {
  var v = schedVenue, y = schedYear, mo = schedMonth;
  var py = y, pm = mo - 1;
  if (pm < 1) { pm = 12; py--; }
  // Check if prev month has any data
  var hasAny = false;
  for (var di = 0; di < DAY_KEYS.length; di++) {
    var k = schedKey(v, py, pm, 1, DAY_KEYS[di], '09:30');
    if (schedData[k] && schedData[k].length) { hasAny = true; break; }
  }
  if (!hasAny) return;
  var nw  = getWeeksInMonth(y, mo);
  var pnw = getWeeksInMonth(py, pm);
  for (var w = 1; w <= nw; w++) {
    var srcW = Math.min(w, pnw);
    for (var di = 0; di < DAY_KEYS.length; di++) {
      var dk = DAY_KEYS[di];
      var sls = getSlotsForDk(dk);
      for (var si = 0; si < sls.length; si++) {
        var sl = sls[si];
        var src = schedKey(v, py, pm, srcW, dk, sl);
        var dst = schedKey(v, y,  mo, w,    dk, sl);
        if (!(schedData[dst] && schedData[dst].length) && schedData[src])
          schedData[dst] = JSON.parse(JSON.stringify(schedData[src]));
      }
    }
  }
  svS(); renderSched();
}

function updateHistCtrl() {

    yh += '<option value="' + yrs[i] + '"' + (yrs[i] === cy ? ' selected' : '') + '>' + yrs[i] + '年</option>';
  ySel.innerHTML = yh;

  if (hPeriod === 'year') { mSel.style.display = 'none'; return; }

  for (var i = 0; i < keys.length; i++) {
    var p2 = keys[i].split('-');
    if (p2[0] === cy) { var m2 = parseInt(p2[1]); if (!seen2[m2]) { seen2[m2]=1; mos.push(m2); } }
  }
  mos.sort(function(a,b){return a-b;});
  var cm = mSel.value || (mos.length ? String(mos[mos.length-1]) : '4');

  for (var i = 0; i < mos.length; i++)
    mh += '<option value="' + mos[i] + '"' + (mos[i] == cm ? ' selected' : '') + '>' + mos[i] + '月</option>';

function getVR(ds, ym, v) {
  if (v === 'all') {
    return { cap: dateCap(ds,'x') + dateCap(ds,'b'), used: dateUsed(ds,'x',ym) + dateUsed(ds,'b',ym) };
  }
  return { cap: dateCap(ds, v), used: dateUsed(ds, v, ym) };
}

function renderMonthView(yr, mo, v, ym) {
  var days = getDaysInMonth(yr, mo);
  var offset = (days[0].getDay() + 6) % 7;
  var hds = ['一','二','三','四','五','六','日'];
  var h = '<div class="cgrid">';
  for (var i = 0; i < hds.length; i++) h += '<div class="chd">' + hds[i] + '</div>';
  for (var i = 0; i < offset; i++)     h += '<div class="cday cempty"></div>';
  var mC = 0, mU = 0;
  for (var di = 0; di < days.length; di++) {
    var d = days[di], ds = fmtDate(d), vr = getVR(ds, ym, v);
    mC += vr.cap; mU += vr.used;
    var isSel = selDate === ds;
    if (!vr.cap) {
      h += '<div class="cday" style="background:var(--bg2)'
         + (isSel ? ';border:.5px solid var(--bd2)' : '') + '">'
         + '<div class="cdn" style="color:var(--tx3)">' + d.getDate() + '</div>'
         + '<div style="font-size:9px;color:var(--tx3)">休館</div></div>';
      continue;
    }
    var r = vr.used / vr.cap, p = Math.round(r * 100);
    var op = Math.max(0.12, r);
    var hex = Math.round(op * 255).toString(16);
    if (hex.length < 2) hex = '0' + hex;
    h += '<div class="cday' + (isSel ? ' on' : '') + '" style="background:' + rc(r) + hex
       + ';cursor:pointer' + (isSel ? ';border:.5px solid var(--bd2)' : '') + '"'
       + ' onclick="selectDate(\'' + ds + '\')">'
       + '<div class="cdn">' + d.getDate() + '</div>'
       + '<div class="cdp" style="color:' + rc(r) + '">' + p + '%</div></div>';
  }
  h += '</div>';
  var tR = mC ? mU / mC : 0, pct = Math.round(tR * 100), col = rc(tR);
  h += '<div class="metrics">'
     + '<div class="mc"><div class="mcl">月總產能</div><div class="mcv">' + mC + '</div></div>'
     + '<div class="mc"><div class="mcl">月實際排課</div><div class="mcv">' + mU + '</div></div>'
     + '<div class="mc"><div class="mcl">月平均利用率</div>'
     + '<div class="mcv" style="color:' + col + '">' + pct + '% <span class="tag ' + tcls(tR) + '">' + tlabel(tR) + '</span></div>'
     + '<div class="pb"><div class="pf" style="width:' + pct + '%;background:' + col + '"></div></div>'
     + '</div></div>';
  h += '<div id="day-detail">'
     + (selDate ? renderDayDetail(selDate, v, ym) : '<p style="font-size:12px;color:var(--tx3);margin-top:6px">點擊日期查看課程明細</p>')
     + '</div>';
  return h;
}

function renderDayDetail(ds, v, ym) {
  var wds = ['日','一','二','三','四','五','六'];
  var d   = new Date(ds.replace(/\//g, '-'));
  var sls = getDateSlots(ds);
  if (!sls.length) return '';
  var vks = (v === 'all') ? ['x','b'] : [v];
  var h   = '<div style="margin-top:12px"><div class="sec">' + ds + '（週' + wds[d.getDay()] + '）課程明細</div>';
  for (var vi = 0; vi < vks.length; vi++) {
    var vk = vks[vi];
    var sm = ((HD[ym] || {})[vk] || {})[ds] || {};
    var Z  = VENUES[vk].zones;
    if (v === 'all') h += '<div style="font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:4px">' + VENUES[vk].name + '</div>';
    h += '<table class="htable" style="margin-bottom:' + (vi < vks.length-1 ? '10px' : '0') + '">'
       + '<thead><tr><th>時段</th><th style="text-align:left">課程</th><th>佔用</th><th>剩餘</th><th>利用率</th></tr></thead><tbody>';
    for (var si = 0; si < sls.length; si++) {
      var sl   = sls[si];
      var cids = sm[sl] || [];
      var used = 0;
      for (var ci = 0; ci < cids.length; ci++) used += czForVenue(cids[ci], vk);
      var rem  = Z - used, r = used / Z, p = Math.round(r * 100);
      var cH = '';
      if (!cids.length) {
        cH = '<span style="font-size:11px;color:var(--tx3)">—</span>';
      } else {
        for (var ci = 0; ci < cids.length; ci++) {
          var cid   = cids[ci];
          var zu    = czForVenue(cid, vk);
          var clr   = CID_COLOR[cid] || '#888';
          var clbl  = CID_LABEL[cid] || cid;
          cH += '<span style="display:inline-flex;align-items:center;font-size:10px;padding:2px 6px;border-radius:4px;color:#fff;background:' + clr + ';font-weight:500;margin:1px 2px 1px 0">'
              + clbl + ' ' + zu + '區</span>';
        }
      }
      h += '<tr>'
         + '<td style="font-size:11px;color:var(--tx2);white-space:nowrap">' + sl + '</td>'
         + '<td style="text-align:left;padding:4px 8px">' + cH + '</td>'
         + '<td style="font-size:12px;font-weight:500">' + used + '/' + Z + '</td>'
         + '<td style="font-size:12px;font-weight:500;color:' + (rem===0?'#1D9E75':rem<0?'#E24B4A':'var(--tx)') + '">' + rem + '</td>'
         + '<td style="font-size:11px;font-weight:500;color:' + rc(r) + '">' + p + '%</td></tr>';
    }
    h += '</tbody></table>';
  }
  h += '</div>';
  return h;
}

function renderWeekView(yr, mo, v, ym) {
  var days = getDaysInMonth(yr, mo), weeks = {}, wOrder = [];
  for (var i = 0; i < days.length; i++) {
    var wk = isoWeek(days[i]);
    if (!weeks[wk]) { weeks[wk] = []; wOrder.push(wk); }
    weeks[wk].push(days[i]);
  }
  var h = '<table class="htable"><thead><tr><th>週次</th><th>日期範圍</th><th>產能</th><th>已排課</th><th>利用率</th></tr></thead><tbody>';
  for (var wi = 0; wi < wOrder.length; wi++) {
    var wk = wOrder[wi], wDays = weeks[wk], cap = 0, used = 0;
    for (var i = 0; i < wDays.length; i++) {
      var vr = getVR(fmtDate(wDays[i]), ym, v);
      cap += vr.cap; used += vr.used;
    }
    var r = cap ? used/cap : 0, p = Math.round(r*100);
    h += '<tr><td style="font-weight:500">' + wk + '</td>'
       + '<td style="font-size:11px;color:var(--tx2)">' + fmtDate(wDays[0]) + ' ~ ' + fmtDate(wDays[wDays.length-1]) + '</td>'
       + '<td>' + cap + '</td><td>' + used + '</td>'
       + '<td style="font-weight:500;color:' + rc(r) + '">' + p + '% <span class="tag ' + tcls(r) + '">' + tlabel(r) + '</span></td></tr>';
  }
  h += '</tbody></table>';
  return h;
}

function renderYearView(yr, v) {
  var h = '<table class="htable"><thead><tr><th>月份</th><th>產能</th><th>已排課</th><th>利用率</th></tr></thead><tbody>';
  var hasData = false;
  for (var mo = 1; mo <= 12; mo++) {
    var ym = yr + '-' + mo;
    if (!HD[ym]) continue;
    hasData = true;
    var days = getDaysInMonth(parseInt(yr), mo), cap = 0, used = 0;
    for (var i = 0; i < days.length; i++) {
      var vr = getVR(fmtDate(days[i]), ym, v);
      cap += vr.cap; used += vr.used;
    }
    var r = cap ? used/cap : 0, p = Math.round(r*100);
    h += '<tr><td style="font-weight:500">' + mo + '月</td><td>' + cap + '</td><td>' + used + '</td>'
       + '<td style="font-weight:500;color:' + rc(r) + '">' + p + '% <span class="tag ' + tcls(r) + '">' + tlabel(r) + '</span></td></tr>';
  }
  if (!hasData) h += '<tr><td colspan="4" style="text-align:center;color:var(--tx3);padding:16px">尚無資料</td></tr>';
  h += '</tbody></table>';
  return h;
}

function processFile(file) {
  var log = document.getElementById('ilog');
  log.textContent = '解析中...';
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var wb   = XLSX.read(ev.target.result, {type:'array'});
      var ws   = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      var hi   = -1;
      for (var i = 0; i < rows.length; i++) {
        if (rows[i].indexOf('課程名稱') >= 0) { hi = i; break; }
      }
      if (hi < 0) { log.textContent = '找不到標題列'; return; }
      var hdr = rows[hi];
      var ciD = hdr.indexOf('課程日期'), ciT = hdr.indexOf('課程時間');
      var ciN = hdr.indexOf('課程名稱'),  ciV = hdr.indexOf('開課店別');
      var cnt = 0, newD = {};
      for (var i = hi + 1; i < rows.length; i++) {
        var row  = rows[i];
        var rN   = String(row[ciN]).trim();
        var cid  = BF_COURSE[rN];
        if (!cid) continue;
        var slots = BF_TIME[String(row[ciT]).trim()];
        if (!slots) continue;
        var vk   = String(row[ciV]).indexOf('西屯') >= 0 ? 'x' : 'b';
        var rawD = row[ciD], ds = '';
        if (typeof rawD === 'number') {
          var dd = new Date(Math.round((rawD - 25569) * 86400 * 1000));
          ds = dd.getUTCFullYear() + '/' + pad(dd.getUTCMonth()+1) + '/' + pad(dd.getUTCDate());
        } else {
          ds = String(rawD).trim();
        }
        if (!/\d{4}\/\d{2}\/\d{2}/.test(ds)) continue;
        var yr2 = ds.split('/')[0], mo2 = parseInt(ds.split('/')[1]), ym2 = yr2 + '-' + mo2;
        if (!newD[ym2]) newD[ym2] = {x:{}, b:{}};
        if (!newD[ym2][vk][ds]) newD[ym2][vk][ds] = {};
        for (var si = 0; si < slots.length; si++) {
          var sl = slots[si];
          if (!newD[ym2][vk][ds][sl]) newD[ym2][vk][ds][sl] = [];
          if (newD[ym2][vk][ds][sl].indexOf(cid) < 0) newD[ym2][vk][ds][sl].push(cid);
        }
        cnt++;
      }
      var yms = Object.keys(newD);
      for (var i = 0; i < yms.length; i++) HD[yms[i]] = newD[yms[i]];
      svH();
      for (var i = 0; i < yms.length; i++) {
        var ym2 = yms[i], found = false;
        for (var j = 0; j < IR.length; j++) {
          if (IR[j].ym === ym2) { IR[j] = {fn:file.name, ym:ym2, cnt:cnt, at:new Date().toLocaleDateString('zh-TW')}; found = true; break; }
        }
        if (!found) IR.push({fn:file.name, ym:ym2, cnt:cnt, at:new Date().toLocaleDateString('zh-TW')});
      }
      svI();
      log.innerHTML = '<span style="color:#1D9E75;font-weight:500">匯入成功！</span> 共 ' + cnt + ' 筆，涵蓋 ' + yms.join('、') + ' 月份';
      renderImpHist(); updateHistCtrl();
      // Auto-upload original xlsx to SharePoint
      if (msalAccount) uploadXlsxToSharePoint(file);
    } catch(err) { log.textContent = '解析失敗：' + err.message; console.error(err); }
  };
  reader.readAsArrayBuffer(file);
}

function renderImpHist() {
  var el = document.getElementById('imp-hist');

function initMsal() {
  if (typeof msal === 'undefined') {
    var el = document.getElementById('auth-status');

    setTimeout(initMsal, 800);
    return;
  }
  var redirectUri = window.location.origin + window.location.pathname;
  console.log('[MSAL] redirectUri:', redirectUri);
  try {
    msalApp = new msal.PublicClientApplication({
      auth: {
        clientId: MSAL_CONFIG.clientId,
        authority: 'https://login.microsoftonline.com/' + MSAL_CONFIG.tenantId,
        redirectUri: redirectUri
      },
      cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false }
    });
  } catch(e) {
    console.error('[MSAL] init failed', e);
    var el2 = document.getElementById('auth-status');
    if (el2) el2.textContent = '登入模組錯誤：' + e.message;
    return;
  }

  // MSAL v3 requires initialize() before any other call
  var initPromise = (typeof msalApp.initialize === 'function')
    ? msalApp.initialize()
    : Promise.resolve();

  initPromise.then(function() {
    return msalApp.handleRedirectPromise();
  }).then(function(resp) {
    console.log('[MSAL] handleRedirectPromise:', resp ? 'got response' : 'no response');
    if (resp && resp.account) msalAccount = resp.account;
    var accounts = msalApp.getAllAccounts();
    console.log('[MSAL] accounts found:', accounts.length);
    if (accounts.length > 0) {
      msalAccount = accounts[0];
      onSignedIn();

      setAuthUI(false);

    console.error('[MSAL] error', e);
    var el3 = document.getElementById('auth-status');

// Resolve the SharePoint site's DocLib drive ID
function resolveSiteDrive() {
  if (spDriveId) return Promise.resolve(spDriveId);
  return getToken().then(function(tokenResp) {
    var token = tokenResp.accessToken;
    var headers = { 'Authorization': 'Bearer ' + token };
    // Step 1: get site ID
    return fetch(
      'https://graph.microsoft.com/v1.0/sites/' + SP_HOST + ':' + SP_SITE,
      { headers: headers }
    ).then(function(r) {
      if (!r.ok) throw new Error('無法取得 Site，HTTP ' + r.status);
      return r.json();
    }).then(function(site) {
      GRAPH_SITE_BASE = 'https://graph.microsoft.com/v1.0/sites/' + site.id;
      console.log('[SP] site id:', site.id);
      return fetch(GRAPH_SITE_BASE + '/drives', { headers: headers });
    }).then(function(r) {
      if (!r.ok) throw new Error('無法取得 Drive 清單，HTTP ' + r.status);
      return r.json();
    }).then(function(resp) {
      var drives = resp.value;
      console.log('[SP] drives:', drives.map(function(d){
        return d.name + ' (' + d.webUrl + ')';
      }));
      // Find by webUrl ending exactly with /DocLib (not DocLib1, DocLib2...)
      var found = null;
      for (var i = 0; i < drives.length; i++) {
        var url = drives[i].webUrl || '';
        // Match /DocLib exactly at end, not /DocLib1 etc
        if (/\/DocLib$/.test(url)) { found = drives[i]; break; }
      }
      // Fallback: match by name
      if (!found) {
        for (var i = 0; i < drives.length; i++) {
          if (drives[i].name === SP_DRIVE_NAME) { found = drives[i]; break; }
        }
      }
      if (!found && drives.length) {
        found = drives[0];
        console.warn('[SP] fallback to first drive:', found.name);
      }
      if (!found) throw new Error('找不到任何文件庫');
      spDriveId = found.id;
      console.log('[SP] using drive:', found.name, '|', found.webUrl);
      return spDriveId;
    });
  });
}

// Build Graph URL for a file inside the SP folder
function spFileUrl(filePath) {
  return 'https://graph.microsoft.com/v1.0/drives/' + spDriveId + '/root:/' + filePath;
}

// Load swim_data.json from 產能利用率分析 folder
function loadFromSharePoint() {
  if (!msalAccount || !spDriveId) return;
  setSyncStatus('從 SharePoint 載入資料中...', '#EF9F27');
  getToken().then(function(tokenResp) {
    var token = tokenResp.accessToken;
    var headers = { 'Authorization': 'Bearer ' + token };
    return fetch(spFileUrl(SP_DATA_FILE), { headers: headers })
      .then(function(r) {
        if (r.status === 404) return null;
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(meta) {
        if (!meta) {
          setSyncStatus('SharePoint 尚無資料，使用本機資料', 'var(--tx2)');
          return null;
        }
        var dlUrl = meta['@microsoft.graph.downloadUrl'];
        return fetch(dlUrl).then(function(r) { return r.json(); });
      })
      .then(function(data) {
        if (!data) return;
        if (data.schedData) { schedData = data.schedData; svS(); }
        if (data.HD)        { HD = data.HD;               svH(); }
        if (data.IR)        { IR = data.IR;               svI(); }
        if (data.teachers)  { teachers = data.teachers;   svT(); }
        lastSyncTime = new Date();
        setSyncStatus('已從 SharePoint 載入（' + lastSyncTime.toLocaleTimeString('zh-TW') + '）', '#1D9E75');
        renderSched();
        renderTeachers();
      });
  }).catch(function(e) {
    setSyncStatus('載入失敗：' + e.message, '#E24B4A');
    console.error('SP load error', e);
  });
}

// Save swim_data.json to 產能利用率分析 folder
function saveToSharePoint() {
  if (!msalAccount) { alert('請先登入公司帳號'); return; }
  var doSave = function() {
    setSyncStatus('同步到 SharePoint 中...', '#EF9F27');
    var payload = JSON.stringify({
      schedData: schedData,
      HD: HD,
      IR: IR,
      teachers: teachers,
      savedAt: new Date().toISOString()
    });
    return getToken().then(function(tokenResp) {
      var token = tokenResp.accessToken;
      return fetch(
        spFileUrl(SP_DATA_FILE) + ':/content',
        {
          method: 'PUT',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: payload
        }
      );
    }).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      lastSyncTime = new Date();
      setSyncStatus('已同步（' + lastSyncTime.toLocaleTimeString('zh-TW') + '）', '#1D9E75');
    });
  };
  // Make sure drive is resolved first
  resolveSiteDrive().then(doSave).catch(function(e) {
    setSyncStatus('同步失敗：' + e.message, '#E24B4A');
    console.error('SP save error', e);
  });
}

// Upload Bookfast xlsx to 團體課預約報表 folder
function uploadXlsxToSharePoint(file) {
  if (!msalAccount || !spDriveId) return;
  setSyncStatus('上傳報表到 SharePoint...', '#EF9F27');
  getToken().then(function(tokenResp) {
    var token = tokenResp.accessToken;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var destPath = SP_FOLDER_REPORT + '/' + file.name;
      fetch(
        spFileUrl(destPath) + ':/content',
        {
          method: 'PUT',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
          },
          body: ev.target.result
        }
      ).then(function(r) {
        if (r.ok) {
          setSyncStatus('報表已上傳到「團體課預約報表」資料夾', '#1D9E75');
          // Also save updated analysis data
          saveToSharePoint();
        } else {
          setSyncStatus('報表上傳失敗 HTTP ' + r.status, '#E24B4A');
        }
      });
    };
    reader.readAsArrayBuffer(file);
  }).catch(function(e) { console.error('SP upload error', e); });
}
